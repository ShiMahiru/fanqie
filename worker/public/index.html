<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>番茄小说合并版</title>
  <style>
    :root{--bg:#f6f7f9;--panel:#fff;--ink:#20242a;--muted:#68717d;--line:#dfe3e8;--accent:#e94b2e;--accent-soft:#fff0eb;--green:#1f7a58;--soft:#f0f2f5;--danger:#9b1c1c;--shadow:0 1px 2px rgba(16,24,40,.05)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,"Microsoft YaHei",sans-serif;letter-spacing:0}button,input{font:inherit}button{cursor:pointer}.hidden{display:none!important}.topbar{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid var(--line)}.top-inner{height:58px;display:flex;align-items:center;gap:14px;padding:0 18px}.brand{font-size:18px;font-weight:800;color:var(--accent);white-space:nowrap}.nav{display:flex;gap:4px;overflow:auto}.nav button{border:0;background:#fff;color:#424b55;padding:9px 11px;border-radius:6px;white-space:nowrap}.nav button.active{background:var(--accent-soft);color:var(--accent);font-weight:700}.health{margin-left:auto;font-size:12px;color:var(--muted);white-space:nowrap}.main{max-width:1200px;margin:0 auto;padding:16px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:6px;overflow:hidden;box-shadow:var(--shadow)}.small{font-size:12px;color:var(--muted)}.btn{border:1px solid #cfd6de;background:#fff;color:#20242a;border-radius:5px;padding:7px 10px;line-height:1}.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn.sm{font-size:12px;padding:5px 8px}.empty{padding:18px;color:var(--muted)}.error{margin:10px;padding:10px;border-radius:6px;border:1px solid #f0cccc;background:#fff3f3;color:var(--danger);white-space:pre-wrap}.ok{color:var(--green)}.grid{display:grid;gap:10px}.grid.cols2{grid-template-columns:minmax(330px,.82fr) minmax(460px,1.25fr)}.rank-layout{display:grid;grid-template-columns:238px minmax(0,1fr);gap:16px;align-items:start}.rank-menu{position:sticky;top:74px;max-height:calc(100vh - 90px);overflow:auto}.menu-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 14px;border-bottom:1px solid var(--line)}.menu-title{font-weight:800}.menu-group{padding:12px 14px;border-bottom:1px solid var(--line)}.menu-group:last-child{border-bottom:0}.menu-group-title{font-weight:800;font-size:14px;margin-bottom:8px}.menu-list{display:grid;grid-template-columns:1fr;gap:2px}.menu-list button{border:0;background:#fff;color:#414850;text-align:left;border-radius:5px;padding:8px 9px;line-height:1.25}.menu-list button:hover{background:#f8fafb}.menu-list button.active{background:var(--accent-soft);color:var(--accent);font-weight:800}.rank-content{min-width:0}.rank-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 18px 12px;border-bottom:1px solid var(--line);background:#fff}.rank-title{font-size:24px;font-weight:800;margin:0 0 6px}.rank-sub{font-size:13px;color:var(--muted)}.rule-box{padding:12px 18px;border-bottom:1px solid var(--line);background:#fbfbfc;color:#59626d;font-size:13px;line-height:1.7}.rank-list{background:#fff}.rank-card{display:grid;grid-template-columns:56px 76px minmax(0,1fr) auto;gap:14px;align-items:start;padding:18px;border-bottom:1px solid var(--line)}.rank-card:hover{background:#fff8f5}.rank-num{font-size:24px;font-weight:800;color:#b3bac3;text-align:center;line-height:1.1}.rank-card:nth-child(1) .rank-num{color:#ef3c22}.rank-card:nth-child(2) .rank-num{color:#ff8a00}.rank-card:nth-child(3) .rank-num{color:#c79a1b}.cover{width:76px;height:104px;object-fit:cover;border:1px solid var(--line);border-radius:4px;background:var(--soft)}.book-title{font-size:18px;font-weight:800;line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.book-meta{color:var(--muted);font-size:13px;line-height:1.7;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.book-desc{color:#4d5661;font-size:14px;line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-top:6px}.book-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.tag{border:1px solid var(--line);background:#f8fafb;border-radius:4px;padding:3px 6px;font-size:12px;color:#5d6671}.rank-actions{display:flex;gap:6px;justify-content:flex-end}.bar{display:flex;gap:8px;padding:10px;border-bottom:1px solid var(--line)}.bar input{min-width:0;flex:1;border:1px solid var(--line);border-radius:5px;padding:8px 10px}.feed-bar{display:flex;gap:6px;flex-wrap:wrap;padding:8px 10px;border-bottom:1px solid var(--line);background:#fbfbfc}.list{max-height:calc(100vh - 170px);overflow:auto}.row{display:grid;grid-template-columns:42px 54px minmax(0,1fr) auto;gap:10px;align-items:center;padding:10px;border-bottom:1px solid var(--line);background:#fff}.row:hover,.row.selected{background:#fff8f5}.rank-no{font-size:18px;color:#aeb5bd;text-align:center;font-weight:800}.row:nth-child(1) .rank-no{color:#ef3c22}.row:nth-child(2) .rank-no{color:#ff8a00}.row:nth-child(3) .rank-no{color:#c79a1b}.row .cover{width:54px;height:72px}.title{font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.meta{color:var(--muted);font-size:12px;line-height:1.55;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.brief{color:#515a64;font-size:13px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:3px}.actions{display:flex;gap:6px;flex-wrap:wrap}.detail{padding:14px;min-height:190px}.book-head{display:flex;gap:12px}.detail-cover{width:86px;height:116px;object-fit:cover;border:1px solid var(--line);border-radius:4px;background:var(--soft);flex:none}.detail h2{font-size:19px;margin:0 0 6px}.detail p{margin:9px 0;color:#414a54;line-height:1.65}.desc{display:-webkit-box;-webkit-line-clamp:8;-webkit-box-orient:vertical;overflow:hidden}.chapters{max-height:calc(100vh - 300px);overflow:auto;border-top:1px solid var(--line)}.chapter-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center;padding:8px 10px;border-bottom:1px solid var(--line)}.chapter-row:hover{background:#f8fafb}.chapter-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.collapse-row{padding:10px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fbfbfc}.modal{position:fixed;inset:0;background:rgba(20,24,30,.45);display:flex;align-items:center;justify-content:center;z-index:20;padding:18px}.modal-box{width:min(900px,96vw);max-height:88vh;background:#fff;border-radius:8px;border:1px solid var(--line);box-shadow:0 18px 50px rgba(0,0,0,.18);display:flex;flex-direction:column}.modal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line)}.modal-title{font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.modal-body{padding:16px;line-height:1.9;font-size:17px;white-space:pre-wrap;overflow:auto}
    @media(max-width:820px){.main{padding:8px}.rank-layout,.grid.cols2{grid-template-columns:1fr}.rank-menu{position:static;max-height:none}.menu-head{padding:10px}.menu-group{padding:10px;border-bottom:1px solid var(--line)}.menu-list{display:flex;gap:6px;overflow:auto;padding-bottom:2px}.menu-list button{white-space:nowrap;border:1px solid var(--line);padding:7px 9px}.menu-list button.active{border-color:var(--accent)}.rank-head{padding:13px 12px}.rank-title{font-size:20px}.rule-box{padding:10px 12px}.rank-card{grid-template-columns:34px 54px minmax(0,1fr);gap:9px;padding:12px}.rank-actions{grid-column:3;justify-content:flex-start}.rank-num{font-size:18px}.cover{width:54px;height:72px}.book-title{font-size:16px}.book-meta{font-size:12px}.book-desc{-webkit-line-clamp:2;font-size:13px}.health{display:none}.row{grid-template-columns:34px 46px minmax(0,1fr);align-items:start}.row .actions{grid-column:3}.row .cover{width:46px;height:62px}.top-inner{padding:0 10px}}
  </style>
</head>
<body>
<header class="topbar"><div class="top-inner"><div class="brand">番茄小说合并版</div><nav class="nav"><button class="active" data-tab="rank">排行榜</button><button data-tab="reader">搜索阅读</button></nav><div class="health" id="health">检查服务中...</div></div></header>
<main class="main">
  <section id="rank" class="tab">
    <div class="rank-layout">
      <aside class="panel rank-menu" id="rankMenu"><div class="empty">读取排行榜中...</div></aside>
      <section class="panel rank-content">
        <div class="rank-head"><div><h1 class="rank-title" id="rankTitle">排行榜</h1></div><button class="btn sm" onclick="loadRankings(true)">刷新</button></div>
        <div id="rankList" class="rank-list"><div class="empty">选择左侧分类后查看实时数据。</div></div>
      </section>
    </div>
  </section>

  <section id="reader" class="tab hidden">
    <div class="grid cols2">
      <section class="panel"><div class="bar"><input id="searchQuery" placeholder="输入书名" /><button class="btn primary" onclick="searchBooks()">搜索</button></div><div class="feed-bar"><button class="btn sm" onclick="loadFeed('latest')">最新更新</button><button class="btn sm" onclick="loadFeed('recommend')">推荐</button><button class="btn sm" onclick="loadFeed('hot')">最热</button></div><div id="searchResults" class="list"><div class="empty">输入书名搜索，或查看最新/最热。</div></div></section>
      <section class="panel"><div id="bookDetail" class="detail"><div class="empty">从榜单或搜索结果点“查看”。</div></div><div class="collapse-row"><div class="small" id="chapterSummary">章节列表默认收起</div><button class="btn sm" id="chapterToggle" onclick="toggleChapters()">查看章节</button></div><div id="chapters" class="chapters hidden"></div></section>
    </div>
  </section>
</main>
<div id="chapterModal" class="modal hidden"><div class="modal-box"><div class="modal-head"><div class="modal-title" id="modalTitle">章节正文</div><button class="btn sm" onclick="closeChapterModal()">关闭</button></div><div id="modalBody" class="modal-body">读取中...</div></div></div>
<script>
const $=id=>document.getElementById(id);let rankings=[];let rankGroups=[];let activeRankId='';let rankBooks=[];let searchBooksCache=[];let chaptersCollapsed=true;
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
async function api(path,opts={}){const r=await fetch(path,{headers:{'Content-Type':'application/json'},...opts});const t=await r.text();let d;try{d=JSON.parse(t)}catch{d=t}if(!r.ok)throw d;return d}
function err(e){return `<div class="error">${esc((e&&e.error)||e.message||e)}</div>`}
function showTab(id){document.querySelectorAll('.tab').forEach(x=>x.classList.add('hidden'));$(id).classList.remove('hidden');document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>showTab(b.dataset.tab));
async function init(){try{const h=await api('/api/health');$('health').innerHTML='<span class="ok">服务正常</span>'}catch(e){$('health').innerHTML=err(e)}await loadRankings(false)}
function groupsFromRankings(rows){const map=new Map();rows.forEach(r=>{const title=r.group||r.section||'排行榜';if(!map.has(title))map.set(title,[]);map.get(title).push(r)});return [...map.entries()].map(([title,items])=>({title,items}))}
async function loadRankings(refresh=false){try{const d=await api('/api/rankings'+(refresh?'?refresh=1':''));rankings=d.rankings||[];rankGroups=(d.groups&&d.groups.length?d.groups:groupsFromRankings(rankings));if(!activeRankId&&rankings.length)activeRankId=rankings[0].id;renderRankMenu();if(activeRankId)await loadRanking(activeRankId);}catch(e){$('rankMenu').innerHTML=err(e)}}
function renderRankMenu(){if(!rankGroups.length){$('rankMenu').innerHTML='<div class="empty">暂无榜单</div>';return}$('rankMenu').innerHTML=`<div class="menu-head"><div><div class="menu-title">排行榜</div><div class="small">按官网分类</div></div></div>`+rankGroups.map(g=>`<div class="menu-group"><div class="menu-group-title">${esc(g.title)}</div><div class="menu-list">${(g.items||[]).map(r=>`<button class="${activeRankId===r.id?'active':''}" onclick="chooseRank('${esc(r.id)}')">${esc(r.category_name||r.name)}</button>`).join('')}</div></div>`).join('')}
function chooseRank(id){activeRankId=id;renderRankMenu();loadRanking(id)}
async function loadRanking(id){const meta=rankings.find(x=>x.id===id)||{};$('rankTitle').textContent=meta.name||'排行榜';$('rankList').innerHTML='<div class="empty">读取排行榜中...</div>';try{const d=await api('/api/ranking?ranking_id='+encodeURIComponent(id));rankBooks=d.books||[];$('rankTitle').textContent=d.ranking_name||meta.name||id;$('rankList').innerHTML=rankBooks.length?rankBooks.map((b,i)=>rankBookCard(b,i)).join(''):'<div class="empty">暂无数据，可以换一个分类，或到“搜索阅读”直接搜书。</div>'}catch(e){$('rankList').innerHTML=err(e)}}
function rankBookCard(b,i){const meta=[b.author||b['作者']||'未知作者',b.category,b.score?`评分 ${b.score}`:''].filter(Boolean).join(' · ');const tags=[b.read_count?`在读 ${b.read_count}`:'',b.word_count?`${b.word_count} 字`:'',b.creation_status==='0'?'连载中':(b.creation_status==='1'?'已完结':'')].filter(Boolean);return `<article class="rank-card"><div class="rank-num">${String(b.rank||i+1).padStart(2,'0')}</div><img class="cover" src="${esc(b.cover||'')}" alt=""><div><div class="book-title">${esc(b.title||b['书名'])}</div><div class="book-meta">${esc(meta)} · ID ${esc(b.id)}</div><div class="book-desc">${esc(b.synopsis||b['简介']||'')}</div><div class="book-tags">${tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div></div><div class="rank-actions"><button class="btn sm primary" onclick="openBook('${esc(b.id)}')">查看</button></div></article>`}
function bookRow(b,i,source){const meta=[b.author||b['作者']||'未知作者',b.category,b.score?`评分 ${b.score}`:'',b.read_count?`阅读 ${b.read_count}`:''].filter(Boolean).join(' · ');return `<div class="row" data-id="${esc(b.id)}"><div class="rank-no">${esc(b.rank||b['排名']||i+1)}</div><img class="cover" src="${esc(b.cover||'')}" alt=""><div><div class="title">${esc(b.title||b['书名'])}</div><div class="meta">${esc(meta)} · ID ${esc(b.id)}</div><div class="brief">${esc(b.synopsis||b['简介']||'')}</div></div><div class="actions"><button class="btn sm primary" onclick="openBook('${esc(b.id)}')">查看</button></div></div>`}
async function searchBooks(){const q=$('searchQuery').value.trim();if(!q){$('searchResults').innerHTML='<div class="empty">请输入书名。</div>';return}const params=new URLSearchParams({query:q,query_type:'1',filter:'127,127,127,127',page_index:'0',page_count:'10'});$('searchResults').innerHTML='<div class="empty">搜索中...</div>';try{const d=await api('/api/search?'+params.toString());searchBooksCache=d.results||[];$('searchResults').innerHTML=searchBooksCache.map((b,i)=>bookRow(b,i,'search')).join('')||'<div class="empty">无匹配书名</div>'}catch(e){$('searchResults').innerHTML=err(e)}}
async function loadFeed(kind){const map={latest:'/api/latest-updates?offset=0&limit=20',recommend:'/api/recommend?type=3&offset=0&limit=20',hot:'/api/top-books?offset=0&limit=50'};const title={latest:'最新更新',recommend:'推荐',hot:'最热'}[kind]||'列表';$('searchResults').innerHTML=`<div class="empty">读取${title}中...</div>`;try{const d=await api(map[kind]);const rows=kind==='latest'?(d.updates||[]).map(x=>({id:x.id,title:x.title,author:x.author,category:x.category,synopsis:x.chapter_title,rank:'新'})):(d.books||[]);searchBooksCache=rows;$('searchResults').innerHTML=rows.map((b,i)=>bookRow(b,i,kind)).join('')||'<div class="empty">暂无数据</div>'}catch(e){$('searchResults').innerHTML=err(e)}}
async function openBook(id){showTab('reader');$('bookDetail').innerHTML='<div class="empty">读取真实详情中...</div>';$('chapters').innerHTML='';$('chapters').classList.add('hidden');chaptersCollapsed=true;$('chapterToggle').textContent='查看章节';$('chapterSummary').textContent='章节列表默认收起';try{const d=await api('/api/novels/'+id);$('bookDetail').innerHTML=`<div class="book-head">${d.cover_image_url?`<img class="detail-cover" src="${esc(d.cover_image_url)}" alt="">`:''}<div><h2>${esc(d.title)}</h2><div class="meta">${esc(d.author||'未知作者')} · 章节 ${esc(d.chapters_in_db)} · ID ${esc(d.id)}</div><p class="desc">${esc(d.description||'')}</p><button class="btn" onclick="downloadBook('${esc(id)}',this)">导出 TXT</button></div></div>`;const chapters=d.chapters||[];$('chapterSummary').textContent=chapters.length?`共 ${chapters.length} 章`:'未获取到目录';$('chapters').innerHTML=chapters.map(c=>`<div class="chapter-row"><div class="chapter-title">${esc(c.index)}. ${esc(c.title)} ${c.is_free?'':'· 可能付费'}</div><button class="btn sm" onclick="openChapter('${esc(id)}','${esc(c.id)}')">查看正文</button></div>`).join('')||'<div class="empty">未获取到目录</div>'}catch(e){$('bookDetail').innerHTML=err(e)}}
function toggleChapters(){chaptersCollapsed=!chaptersCollapsed;$('chapters').classList.toggle('hidden',chaptersCollapsed);$('chapterToggle').textContent=chaptersCollapsed?'查看章节':'收起章节'}function closeChapterModal(){$('chapterModal').classList.add('hidden')}async function openChapter(bookId,chapterId){$('chapterModal').classList.remove('hidden');$('modalTitle').textContent='读取中...';$('modalBody').textContent='正在读取真实正文...';try{const c=await api(`/api/novels/${bookId}/chapters/${chapterId}`);$('modalTitle').textContent=c.title||'章节正文';$('modalBody').textContent=(c.title||'')+'\n\n'+(c.content||'')}catch(e){$('modalTitle').textContent='读取失败';$('modalBody').innerHTML=err(e)}}
function filenameFromDisposition(header){if(!header)return'';const star=header.match(/filename\*=UTF-8''([^;]+)/i);if(star)return decodeURIComponent(star[1]);const normal=header.match(/filename="?([^";]+)"?/i);return normal?normal[1]:''}
async function downloadBook(id,btn){const old=btn?btn.textContent:'';if(btn){btn.textContent='全本生成中...';btn.disabled=true}try{const r=await fetch('/api/novels/'+id+'/download');if(!r.ok)throw new Error(await r.text());const blob=await r.blob();const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;const fallback=($('bookDetail').querySelector('h2')?.textContent||id)+'.txt';a.download=filenameFromDisposition(r.headers.get('Content-Disposition'))||fallback;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);if(btn)btn.textContent='已导出'}catch(e){alert('导出失败：'+((e&&e.message)||e));if(btn)btn.textContent=old}finally{setTimeout(()=>{if(btn){btn.textContent=old;btn.disabled=false}},1200)}}
$('chapterModal').addEventListener('click',e=>{if(e.target.id==='chapterModal')closeChapterModal()});init();
</script>
</body>
</html>
